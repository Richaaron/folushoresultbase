[build]
  command = "npm install && npm --prefix backend install && npm --prefix netlify/functions install && npm --prefix frontend-react install && npm --prefix frontend-react run build"
  publish = "frontend-react/dist"
  functions = "netlify/functions"

[dev]
  command = "npm start"
  port = 3000

# Build cache configuration
[build.cache]
  npm = true

# Environment variables (set these in Netlify dashboard)
# Required:
# - DATABASE_URL (Supabase connection string)
# - JWT_SECRET (32+ character random string)
# - FRONTEND_URL (your Netlify domain)
# 
# Optional:
# - NODE_ENV (set to production)
# - EMAIL_USER (Gmail for notifications)
# - EMAIL_PASSWORD (Gmail App Password)

# Route API calls to serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA routing fallback (important for React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Health check endpoints (no redirect needed)
# GET /.netlify/functions/api/health
# GET /.netlify/functions/api/health/detailed

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Disable caching for API calls
[[headers]]
  for = "/.netlify/functions/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Enable caching for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Enable compression
[[headers]]
  for = "/*"
  [headers.values]
    Content-Encoding = "gzip, br"

# Error page redirects
[[redirects]]
  from = ""
  status = 404
  to = "/index.html"


