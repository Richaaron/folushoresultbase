[build]
  command = "npm ci && npm run build:frontend"
  publish = "frontend-react/dist"
  functions = "netlify/functions"
  base = "/"

[dev]
  command = "npm start"
  port = 3000

# Route API calls to serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA routing fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

