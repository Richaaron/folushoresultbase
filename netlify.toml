[build]
  command = "cd backend && npm install && cd ../frontend-react && npm install && npm run build"
  publish = "frontend-react/dist"
  functions = "netlify/functions"

[dev]
  command = "npm start"
  port = 3000

# Route API calls to serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA routing fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

